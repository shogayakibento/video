<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08081a"/>
      <stop offset="100%" style="stop-color:#0f0f28"/>
    </linearGradient>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#9b5df5"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#f0e0ff"/>
      <stop offset="100%" style="stop-color:#c49af8"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#c41057"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="15%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ff2d78;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#9b5df5;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9b5df5;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ff2d78" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff2d78" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>

  <!-- 上下のラインバー -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#pinkPurple)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#pinkPurple)"/>

  <!-- 背景の装飾グリッド線 -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>

  <!-- 背景の装飾円 -->
  <circle cx="100" cy="100" r="180" fill="none" stroke="#ff2d78" stroke-width="0.8" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="none" stroke="#9b5df5" stroke-width="0.8" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="none" stroke="#9b5df5" stroke-width="0.5" opacity="0.07"/>

  <!-- ドット装飾 -->
  <circle cx="180" cy="490" r="2.5" fill="#ff2d78" opacity="0.4"/>
  <circle cx="240" cy="150" r="2" fill="#9b5df5" opacity="0.35"/>
  <circle cx="980" cy="120" r="2.5" fill="#ff2d78" opacity="0.35"/>
  <circle cx="1050" cy="320" r="2" fill="#c49af8" opacity="0.35"/>
  <circle cx="120" cy="380" r="1.5" fill="#ff6ba8" opacity="0.3"/>
  <circle cx="1080" cy="200" r="1.5" fill="#9b5df5" opacity="0.3"/>

  <!-- ロゴ (左上) -->
  <rect x="80" y="48" width="44" height="44" rx="12" fill="url(#pinkPurple)"/>
  <text x="102" y="79" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">F</text>
  <text x="138" y="79" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#e2e8f0" text-anchor="start" letter-spacing="1">FanzaGate</text>

  <!-- メインキャッチコピー -->
  <text x="600" y="210" font-family="Noto Sans CJK JP, sans-serif" font-size="28" font-weight="700" fill="#ff6ba8" text-anchor="middle" letter-spacing="3" filter="url(#textGlow)">FANZA 人気・新着・バズり動画を毎日更新</text>

  <!-- メインタイトル -->
  <text x="600" y="310" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="-2">FanzaGate</text>

  <!-- サブタイトル -->
  <text x="600" y="370" font-family="Noto Sans CJK JP, sans-serif" font-size="22" fill="#8892a4" text-anchor="middle" letter-spacing="2">ランキング｜新着｜VR｜Xバズり｜女優</text>

  <!-- CTAボタン -->
  <rect x="430" y="410" width="340" height="64" rx="32" fill="url(#btnGrad)" filter="url(#btnShadow)"/>
  <text x="600" y="450" font-family="Noto Sans CJK JP, Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">今すぐランキングを見る  →</text>

  <!-- URL -->
  <text x="600" y="558" font-family="Arial, sans-serif" font-size="18" fill="#555e70" text-anchor="middle" letter-spacing="1">owstrategy.com/fanzavideo</text>
</svg>
