<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08081a"/>
      <stop offset="100%" style="stop-color:#0f0f28"/>
    </linearGradient>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#9b5df5"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1040"/>
      <stop offset="100%" style="stop-color:#1a0828"/>
