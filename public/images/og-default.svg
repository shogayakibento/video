    <linearGradient id="rankBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#9b5df5"/>
    </linearGradient>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#ff2d78" flood-opacity="0.6"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="card1clip"><rect x="20" y="80" width="270" height="152" rx="8"/></clipPath>
    <clipPath id="card2clip"><rect x="300" y="80" width="270" height="152" rx="8"/></clipPath>
    <clipPath id="card3clip"><rect x="20" y="244" width="270" height="152" rx="8"/></clipPath>
    <clipPath id="card4clip"><rect x="300" y="244" width="270" height="152" rx="8"/></clipPath>
    <clipPath id="card5clip"><rect x="20" y="408" width="270" height="152" rx="8"/></clipPath>
    <clipPath id="card6clip"><rect x="300" y="408" width="270" height="152" rx="8"/></clipPath>
