<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08081a"/>
      <stop offset="100%" style="stop-color:#120820"/>
    </linearGradient>
    <linearGradient id="bottomBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#080818"/>
    </linearGradient>
    <linearGradient id="pinkPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#9b5df5"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#9b5df5"/>
    </linearGradient>
    <linearGradient id="searchBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a35"/>
      <stop offset="100%" style="stop-color:#151530"/>
    </linearGradient>
    <linearGradient id="thumb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1a4a"/>
      <stop offset="100%" style="stop-color:#1a0828"/>
    </linearGradient>
    <linearGradient id="thumb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#080f20"/>
    </linearGradient>
    <linearGradient id="thumb3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a1a3a"/>
      <stop offset="100%" style="stop-color:#300f2a"/>
    </linearGradient>
    <linearGradient id="thumb4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a40"/>
      <stop offset="100%" style="stop-color:#200a38"/>
    </linearGradient>
    <linearGradient id="cardOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="50%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="glowHero" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#9b5df5;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="btnGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff2d78" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- 上部ヒーローセクション -->
  <rect width="1200" height="255" fill="url(#heroBg)"/>
  <rect width="1200" height="255" fill="url(#glowHero)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#pinkPurple)"/>

  <!-- ロゴ -->
  <rect x="36" y="22" width="34" height="34" rx="9" fill="url(#logoGrad)"/>
  <text x="53" y="45" font-family="Arial Black, sans-serif" font-size="19" font-weight="900" fill="white" text-anchor="middle">F</text>
  <text x="82" y="45" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#e2e8f0">FanzaGate</text>

  <!-- ナビ -->
  <text x="440" y="45" font-family="Noto Sans CJK JP, sans-serif" font-size="13" fill="#94a3b8">ホーム</text>
  <text x="510" y="45" font-family="Noto Sans CJK JP, sans-serif" font-size="13" fill="#94a3b8">動画</text>
  <text x="560" y="45" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">VR</text>
  <text x="605" y="45" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">DVD</text>
  <text x="650" y="45" font-family="Noto Sans CJK JP, sans-serif" font-size="13" fill="#94a3b8">ランキング</text>
  <rect x="728" y="28" width="108" height="24" rx="12" fill="#ff2d78"/>
  <text x="782" y="44" font-family="Noto Sans CJK JP, sans-serif" font-size="12" fill="white" text-anchor="middle">Xバズりランキング</text>
  <text x="852" y="45" font-family="Noto Sans CJK JP, sans-serif" font-size="13" fill="#94a3b8">女優</text>

  <!-- メインタイトル -->
  <text x="600" y="130" font-family="Noto Sans CJK JP, Arial Black, sans-serif" font-size="46" font-weight="900" fill="white" text-anchor="middle">FANZA<tspan fill="#ff2d78">人気作品</tspan>ランキング</text>

  <!-- サブタイトル -->
  <text x="600" y="163" font-family="Noto Sans CJK JP, sans-serif" font-size="15" fill="#8892a4" text-anchor="middle">動画・VR・DVD・コミック｜毎日更新の最新ランキングで今日のおすすめを探そう</text>

  <!-- 検索バー -->
  <rect x="330" y="180" width="400" height="42" rx="8" fill="url(#searchBg)" stroke="#2a2a4a" stroke-width="1"/>
  <text x="358" y="205" font-family="Noto Sans CJK JP, sans-serif" font-size="13" fill="#4a5568">作品名・キーワードで検索...</text>
  <rect x="730" y="180" width="76" height="42" rx="8" fill="#ff2d78" filter="url(#btnGlow)"/>
  <text x="768" y="205" font-family="Noto Sans CJK JP, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">検索</text>

  <!-- タグ -->
  <rect x="382" y="232" width="80" height="24" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="422" y="248" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">人気作品</text>
  <rect x="472" y="232" width="58" height="24" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="501" y="248" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">新作</text>
  <rect x="540" y="232" width="72" height="24" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="576" y="248" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">VR動画</text>
  <rect x="622" y="232" width="88" height="24" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="666" y="248" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">ランキング</text>

  <!-- 下部: 動画一覧セクション -->
  <rect x="0" y="255" width="1200" height="375" fill="url(#bottomBg)"/>
  <rect x="0" y="255" width="1200" height="1" fill="#1e1e38"/>

  <!-- セクションタイトル -->
  <text x="30" y="292" font-family="Noto Sans CJK JP, Arial Black, sans-serif" font-size="21" font-weight="900" fill="white">人気ランキング</text>
  <text x="1170" y="292" font-family="Noto Sans CJK JP, sans-serif" font-size="13" fill="#9b5df5" text-anchor="end">すべて見る →</text>

  <!-- カード1 -->
  <rect x="30" y="304" width="271" height="308" rx="8" fill="url(#thumb1)"/>
  <ellipse cx="165" cy="390" rx="55" ry="85" fill="#5a1040" opacity="0.5"/>
  <ellipse cx="110" cy="405" rx="38" ry="68" fill="#3a0830" opacity="0.4"/>
  <rect x="30" y="304" width="271" height="308" rx="8" fill="url(#cardOverlay)"/>
  <rect x="30" y="304" width="36" height="28" rx="4" fill="#ff2d78"/>
  <text x="48" y="323" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" text-anchor="middle">1</text>
  <text x="42" y="564" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#f1f5f9">食べごろ姉妹のからだ。親戚の...</text>
  <text x="42" y="580" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#ff6ba8">児玉七海</text>
  <text x="42" y="596" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">★ 4.57</text>
  <text x="287" y="596" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#9b5df5" text-anchor="end">990円~</text>

  <!-- カード2 -->
  <rect x="319" y="304" width="271" height="308" rx="8" fill="url(#thumb2)"/>
  <ellipse cx="454" cy="385" rx="50" ry="88" fill="#102040" opacity="0.5"/>
  <ellipse cx="510" cy="400" rx="36" ry="62" fill="#0a1530" opacity="0.4"/>
  <rect x="319" y="304" width="271" height="308" rx="8" fill="url(#cardOverlay)"/>
  <rect x="319" y="304" width="36" height="28" rx="4" fill="#ff2d78"/>
  <text x="337" y="323" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" text-anchor="middle">2</text>
  <text x="331" y="564" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#f1f5f9">ズルい程イイオンナ 第2章...</text>
  <text x="331" y="580" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#ff6ba8">篠原いよ</text>
  <text x="331" y="596" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">★ 4.67</text>
  <text x="576" y="596" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#9b5df5" text-anchor="end">1,320円~</text>

  <!-- カード3 -->
  <rect x="608" y="304" width="271" height="308" rx="8" fill="url(#thumb3)"/>
  <ellipse cx="743" cy="388" rx="52" ry="84" fill="#401030" opacity="0.5"/>
  <ellipse cx="690" cy="402" rx="34" ry="58" fill="#300a22" opacity="0.4"/>
  <rect x="608" y="304" width="271" height="308" rx="8" fill="url(#cardOverlay)"/>
  <rect x="608" y="304" width="36" height="28" rx="4" fill="#ff2d78"/>
  <text x="626" y="323" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" text-anchor="middle">3</text>
  <text x="620" y="564" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#f1f5f9">都合のいい女になりたい...</text>
  <text x="620" y="580" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#ff6ba8">羽月乃蒼</text>
  <text x="620" y="596" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">★ 4.68</text>
  <text x="865" y="596" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#9b5df5" text-anchor="end">880円~</text>

  <!-- カード4 -->
  <rect x="897" y="304" width="271" height="308" rx="8" fill="url(#thumb4)"/>
  <ellipse cx="1032" cy="385" rx="48" ry="80" fill="#1a0a40" opacity="0.5"/>
  <ellipse cx="1080" cy="402" rx="38" ry="62" fill="#100830" opacity="0.4"/>
  <rect x="897" y="304" width="271" height="308" rx="8" fill="url(#cardOverlay)"/>
  <rect x="897" y="304" width="36" height="28" rx="4" fill="#ff2d78"/>
  <text x="915" y="323" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" text-anchor="middle">4</text>
  <text x="909" y="564" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#f1f5f9">すっぴん彼女を目覚ましSEX...</text>
  <text x="909" y="580" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#ff6ba8">七瀬アリス</text>
  <text x="909" y="596" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">★ 4.87</text>
  <text x="1154" y="596" font-family="Noto Sans CJK JP, sans-serif" font-size="11" fill="#9b5df5" text-anchor="end">1,100円~</text>

  <!-- 下ライン -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#pinkPurple)"/>
</svg>
